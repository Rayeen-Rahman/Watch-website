<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary SEO ─────────────────────────────────────── -->
    <title>Artifact BD — Premium Timepieces in Bangladesh</title>
    <meta name="description" content="Shop premium watches in Bangladesh. Analog, digital, smartwatch and luxury collections. Cash on delivery available. Only at Artifact BD." />
    <link rel="canonical" href="https://youractualdomain.com/" />

    <!-- ── Open Graph / Social Sharing ────────────────────── -->
    <meta property="og:title"       content="Artifact BD — Premium Timepieces in Bangladesh" />
    <meta property="og:description" content="Precision engineering meets timeless design. Shop Artifact BD's curated collection of premium watches." />
    <meta property="og:image"       content="https://youractualdomain.com/og-image.jpg" />
    <meta property="og:url"         content="https://youractualdomain.com/" />
    <meta property="og:type"        content="website" />
    <meta property="og:site_name"   content="Artifact BD" />
    <meta name="twitter:card"       content="summary_large_image" />
    <meta name="twitter:title"      content="Artifact BD — Premium Timepieces in Bangladesh" />
    <meta name="twitter:description" content="Shop premium watches with cash on delivery across Bangladesh. Only at Artifact BD." />
    <meta name="twitter:image"      content="https://youractualdomain.com/og-image.jpg" />

    <!-- ── PWA / Mobile App ───────────────────────────────── -->
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="Artifact BD" />
    <link rel="apple-touch-icon" href="/favicon.svg" />

    <!-- ── Icons ──────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- ── Google Fonts (non-blocking preload strategy) ───── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Load fonts asynchronously to avoid render-blocking (improves LCP & FCP) -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet"
      />
    </noscript>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
